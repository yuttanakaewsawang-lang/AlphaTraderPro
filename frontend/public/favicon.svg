<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <rect width="48" height="48" rx="10" fill="#0C1222"/>

  <!-- candle 1: bear -->
  <line x1="8"  y1="5"  x2="8"  y2="22" stroke="#FF5252" stroke-width="1.5"/>
  <rect x="5"   y="9"   width="6" height="10" fill="#FF5252" rx="1"/>

  <!-- candle 2: bull -->
  <line x1="18" y1="7"  x2="18" y2="22" stroke="#00E676" stroke-width="1.5"/>
  <rect x="15"  y="10"  width="6" height="9"  fill="#00E676" rx="1"/>

  <!-- candle 3: bull tall -->
  <line x1="28" y1="4"  x2="28" y2="24" stroke="#00E676" stroke-width="1.5"/>
  <rect x="25"  y="7"   width="6" height="14" fill="#00E676" rx="1"/>

  <!-- candle 4: bull tallest -->
  <line x1="40" y1="2"  x2="40" y2="20" stroke="#00E676" stroke-width="1.5"/>
  <rect x="37"  y="4"   width="6" height="14" fill="#00E676" rx="1"/>

  <!-- divider -->
  <line x1="4" y1="27" x2="44" y2="27" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1"/>

  <!-- ATP text -->
  <text x="24" y="42" font-family="Arial Black, Arial" font-weight="900"
        font-size="13" fill="#00E676" text-anchor="middle" letter-spacing="1">ATP</text>
</svg>
